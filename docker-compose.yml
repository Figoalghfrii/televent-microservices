services:
  event-service:
    build:
      context: ./event-service
    container_name: televent-event-service
    env_file:
      - ./event-service/.env
    ports:
      - "4001:4001"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1


  ticket-service:
    build:
      context: ./ticket-service
    container_name: televent-ticket-service
    env_file:
      - ./ticket-service/.env
    ports:
      - "4002:4002"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1


  staff-service:
    build:
      context: ./staff-service
    container_name: televent-staff-service
