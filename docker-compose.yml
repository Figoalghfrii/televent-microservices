    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1


  speaker-service:
    build:
      context: ./speaker-service
    container_name: televent-speaker-service
    env_file:
      - ./speaker-service/.env
    ports:
      - "4004:4004"
    restart: unless-stopped
